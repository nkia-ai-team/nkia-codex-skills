interface:
  display_name: "Confluence MD Upload"
  short_description: "Render Markdown reports into Confluence pages"
  default_prompt: "Use $confluence-md-upload to upload this Markdown report to Confluence with diagrams preserved."

dependencies:
  tools:
    - type: "mcp"
      value: "atlassian"
      description: "Atlassian MCP for Confluence page create/update/read"
      transport: "streamable_http"
      url: "https://mcp.atlassian.com/v1/mcp"

policy:
  allow_implicit_invocation: true
